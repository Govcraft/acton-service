# Example configuration file for acton-service microservices
# Copy this to config.toml and customize for your service

[service]
name = "my-service"
# bind = "0.0.0.0"  # IP to bind the listener to. Default 0.0.0.0 (all interfaces).
                    # Set to "127.0.0.1" or "::1" for a loopback-only surface.
port = 8080
log_level = "info"  # trace, debug, info, warn, error
timeout_secs = 30
environment = "dev"  # dev, staging, production
# trust_forwarded_headers = false  # Trust X-Forwarded-For / X-Real-IP for the client IP
                                   # the request context (and audit events) record.
                                   # Default false: only enable behind a proxy you trust
                                   # to set these headers — a direct client can otherwise
                                   # spoof the IP in its own audit trail. Rate limiting
                                   # has its own flag under [rate_limit].

# ============================================================================
# gRPC ([grpc] section, requires the `grpc` feature)
# ============================================================================
# [grpc]
# enabled = true
# use_separate_port = true   # serve gRPC on its own port (below); false = share the HTTP port
# port = 9090
# bind = "127.0.0.1"         # gRPC listener bind. Falls back to [service] bind when unset.
                             # Only applied in separate-port mode.
#
# Per-listener TLS for the separate-port gRPC surface (requires the `tls` feature).
# When present this section is authoritative: enabled = false serves plaintext gRPC
# even when the shared [tls] is active (e.g. a loopback-only surface).
# When omitted, the gRPC listener falls back to the shared [tls] config.
# [grpc.tls]
# enabled = true
# cert_path = "./certs/grpc.pem"
# key_path = "./certs/grpc.key"
# reload_interval_secs = 300             # poll these files; see [tls] below
# reload_on_sighup = true                # reloads BOTH listeners, not just gRPC
# handshake_timeout_secs = 10            # drop a stalled handshake after N s; see [tls]

# ============================================================================
# TOKEN AUTHENTICATION ([token] section with format = "paseto" or "jwt")
# ============================================================================
# PASETO v4 (symmetric or asymmetric) — the default token format
# [token]
# format = "paseto"
# version = "v4"
# purpose = "local"                      # "local" (symmetric) or "public" (asymmetric)
# key_path = "./keys/paseto.key"         # 32-byte key file
# issuer = "my-service"
# # audience = "api.mydomain.com"
# # public_paths = ["/admin/", "/forge/"]  # Skip token auth for these prefixes

# JWT (RSA, ECDSA, or HMAC) — requires the `jwt` feature
# [token]
# format = "jwt"
# public_key_path = "./keys/jwt-public.pem"
# algorithm = "RS256"                        # RS256, ES256, HS256
# issuer = "https://auth.mydomain.com"
# audience = "api.mydomain.com"
# # public_paths = ["/admin/", "/forge/"]    # Skip token auth for these prefixes

[rate_limit]
# Redis-based global rate limiting
per_user_rpm = 200      # Requests per minute per user
per_client_rpm = 1000   # Requests per minute per API client
window_secs = 60

# ============================================================================
# MIDDLEWARE CONFIGURATION
# ============================================================================

[middleware]
# Request body size limit (in MB)
body_limit_mb = 10

# Enable panic recovery (convert panics to 500 responses)
catch_panic = true

# Enable response compression (gzip, br, deflate, zstd)
compression = true

# CORS mode: "permissive", "restrictive", or "disabled"
cors_mode = "permissive"

# ----------------------------------------------------------------------------
# Request Tracking (Request IDs, Header Propagation, Distributed Tracing)
# ----------------------------------------------------------------------------
[middleware.request_tracking]
# Generate and propagate request IDs for distributed tracing
request_id_enabled = true
request_id_header = "x-request-id"

# Propagate headers between microservices (x-request-id, x-trace-id, etc.)
propagate_headers = true

# Mask sensitive headers in logs (authorization, cookie, x-api-key, etc.)
mask_sensitive_headers = true

# ----------------------------------------------------------------------------
# Resilience (Circuit Breaker, Retry, Bulkhead)
# Requires feature: resilience
# ----------------------------------------------------------------------------
[middleware.resilience]
# Circuit breaker configuration
circuit_breaker_enabled = true
circuit_breaker_threshold = 0.5      # 50% failure rate opens circuit
circuit_breaker_min_requests = 10    # Minimum requests before calculating
circuit_breaker_wait_secs = 30       # Wait before attempting to close

# Retry is not server middleware: an inbound request body is a stream that can
# only be consumed once, so it cannot be replayed. Compose retry into your
# outbound clients instead.

# Bulkhead configuration (concurrency limiting)
bulkhead_enabled = true
bulkhead_max_concurrent = 100       # Max concurrent requests
bulkhead_max_wait_ms = 5000         # Max wait for a slot (5 seconds)

# ----------------------------------------------------------------------------
# HTTP Metrics (OpenTelemetry)
# Requires feature: otel-metrics (OTLP push to a collector) and/or
#                   prometheus-metrics (pull-based /metrics endpoint).
# When prometheus-metrics is enabled, metrics are scraped from GET /metrics
# in Prometheus text-exposition format.
# ----------------------------------------------------------------------------
[middleware.metrics]
enabled = true

# Include dimensions in metrics
include_path = true
include_method = true
include_status = true

# Latency histogram buckets (in milliseconds)
latency_buckets_ms = [5.0, 10.0, 25.0, 50.0, 100.0, 250.0, 500.0, 1000.0, 2500.0, 5000.0, 10000.0]

# ----------------------------------------------------------------------------
# Local Rate Limiting (Governor)
# Requires feature: governor
# In-memory rate limiting as fallback when Redis is unavailable
# ----------------------------------------------------------------------------
[middleware.governor]
enabled = true
requests_per_period = 100    # Max requests per period
period_secs = 60             # Time period in seconds (60 = per minute)
burst_size = 10              # Allow temporary bursts

# ----------------------------------------------------------------------------
# Security Headers
# No feature gate required -- uses existing tower-http set-header
# ----------------------------------------------------------------------------
[middleware.security_headers]
enabled = true
hsts = true                              # Strict-Transport-Security (only sent when TLS active)
hsts_max_age_secs = 63072000             # 2 years (OWASP recommendation)
hsts_include_subdomains = false
hsts_preload = false
x_content_type_options = true            # X-Content-Type-Options: nosniff
x_frame_options = "DENY"                 # X-Frame-Options value
x_xss_protection = true                  # X-XSS-Protection: 0 (modern rec: disable browser filter)
referrer_policy = "strict-origin-when-cross-origin"
# permissions_policy = "camera=(), microphone=(), geolocation=()"  # Optional

# ============================================================================
# TLS CONFIGURATION (Optional)
# Requires feature: tls
# ============================================================================
# [tls]
# enabled = true
# cert_path = "./certs/server.pem"       # PEM-encoded certificate chain
# key_path = "./certs/server-key.pem"    # PEM-encoded private key
#
# --- Mutual TLS: verifying client certificates ------------------------------
# Point client_ca_path at a PEM bundle of CA certificates to require connecting
# clients to present a certificate signed by one of them. Omit it to accept all
# clients without a certificate (server-only TLS, the default).
# client_ca_path = "./certs/client-ca.pem"
#
# With client_auth_optional = true, clients WITHOUT a certificate are still
# accepted, but a certificate that is presented must verify — optional means
# "absent is allowed", never "invalid is allowed". Handlers can distinguish the
# two through TlsConnectInfo. Ignored unless client_ca_path is set.
# client_auth_optional = false
#
# --- Certificate rotation without a restart ---------------------------------
# Both triggers below reload the files named above and apply the new certificate
# to the NEXT handshake; connections already established are undisturbed. A
# reload that fails (missing, unparseable, or half-written files) is logged at
# ERROR and leaves the previous certificate serving — rotation can never take
# the listener down.
#
# Poll the files every N seconds and reload when their CONTENTS change. Change
# is detected by hashing the bytes, not by comparing mtimes, so rotations that
# preserve modification times (cp -p, most cert tooling) are still seen.
# Omit to disable polling; 0 is rejected at startup.
# reload_interval_secs = 300
#
# Reload when the process receives SIGHUP. Setting this on EITHER [tls] or
# [grpc.tls] installs one handler that reloads BOTH listeners — a signal that
# rotated only half the surfaces would be confusing during an incident.
# Unix only; configured elsewhere it warns at startup and is ignored.
# reload_on_sighup = true
#
# --- Handshake timeout ------------------------------------------------------
# Maximum time to wait for a TLS handshake to complete before dropping the
# connection. Caps pre-handshake stalls from unauthenticated peers: a peer that
# completes the TCP connect but never sends a ClientHello cannot hold a slot
# open. Each handshake runs concurrently, so one stalled peer never blocks the
# others. Omit to use the default of 10 seconds; 0 is rejected at startup.
# handshake_timeout_secs = 10
#
# For triggers the framework does not model (a Vault lease renewal, a watch on
# a ConfigMap, an admin endpoint), register a callback with
# ServiceBuilder::with_tls_reload and call TlsReloadHandle::reload_all yourself.
# Note that reloading only works for credentials the framework loaded from these
# files. Credentials injected via ServiceBuilder::with_tls_config are static;
# configuring the triggers above for them warns at startup and does nothing.

# ----------------------------------------------------------------------------
# CLIENT mTLS IDENTITY (Optional) — the certificate this service PRESENTS when
# it CALLS another mutual-TLS service. The outbound mirror of [tls] above.
# Requires feature: tls
#
# This section is not read by the framework Config: a service may call several peers with
# different identities, so there is no single framework-level slot. Deserialize
# one ClientIdentityConfig per peer from wherever that peer is configured, then
# build an acton_service::client_tls::ClientIdentitySource from each.
# ----------------------------------------------------------------------------
# [client_identity]
# enabled = true
# cert_path = "./certs/client.pem"       # This service's client cert chain
# key_path = "./certs/client-key.pem"    # This service's client private key
# root_ca_path = "./certs/peer-ca.pem"   # CA that signed the PEER's server cert
# exclusive_roots = false                # false: root_ca_path is ADDED to the
#                                        #   public web PKI roots (default; safe
#                                        #   for clients that also call
#                                        #   publicly-signed endpoints)
#                                        # true: root_ca_path REPLACES them,
#                                        #   pinning trust to your own CA. Use
#                                        #   for private-mesh-only clients.

# ============================================================================
# DATABASE CONFIGURATION (Optional)
# ============================================================================
[database]
url = "postgres://user:password@ysql.ysql-cluster.svc.cluster.local:5433/users_db"
max_connections = 50
min_connections = 5
connection_timeout_secs = 10
max_retries = 5
retry_delay_secs = 2
optional = false      # Service can start without DB if true
lazy_init = true      # Initialize connection in background

# ============================================================================
# SURREALDB CONFIGURATION (Optional)
# Mutually exclusive with [database] and [turso]
# ============================================================================
# [surrealdb]
# url = "ws://localhost:8000"   # ws://, wss://, http://, https://, or mem://
# namespace = "default"
# database = "default"
# username = "root"             # Optional: omit for unauthenticated access
# password = "root"             # Optional: omit for unauthenticated access
# max_retries = 5
# retry_delay_secs = 2
# optional = false              # Service can start without SurrealDB if true
# lazy_init = true              # Initialize connection in background

# ============================================================================
# REDIS CONFIGURATION (Optional)
# ============================================================================
[redis]
url = "redis://redis.redis-cluster.svc.cluster.local:6379"
max_connections = 20
connection_timeout_secs = 10
max_retries = 5
retry_delay_secs = 2
optional = false      # Service can start without Redis if true
lazy_init = true      # Initialize connection in background

# ============================================================================
# NATS CONFIGURATION (Optional)
# ============================================================================
[nats]
url = "nats://nats.nats-cluster.svc.cluster.local:4222"
name = "my-service"
max_reconnects = 10
max_retries = 5
retry_delay_secs = 2
optional = false      # Service can start without NATS if true
lazy_init = true      # Initialize connection in background

# ============================================================================
# AUDIT LOGGING CONFIGURATION (Optional)
# Requires feature: audit
# ============================================================================
# [audit]
# enabled = true
# audit_all_requests = false        # Audit every HTTP request (noisy)
# audit_auth_events = true          # Auto-audit auth events (login, logout, etc.)
# audit_config_events = true        # Emit config audit events (CM-3 compliance)
# otlp_logs_enabled = false         # Export audit logs via OTLP (requires observability)
# audited_routes = ["/api/v1/admin/*"]   # Glob patterns for per-route auditing
# excluded_routes = ["/health", "/ready", "/metrics"]
# drift_endpoint_enabled = false    # Mount GET /admin/config/drift. Default false: the
                                    # endpoint has no auth of its own and sits outside
                                    # route-level middleware — front it with your own
                                    # access control if you enable it.
#
# retention_days = 90               # Days to keep events (omit for infinite)
# archive_path = "/var/audit/archive"  # JSONL archive dir before purge (omit to skip)
# cleanup_interval_hours = 24       # Hours between cleanup runs
#
# [audit.syslog]
# transport = "udp"                 # "udp", "tcp", or "none"
# address = "127.0.0.1:514"
# facility = 13                     # 13 = audit (RFC 5424)
# # app_name = "my-service"         # Defaults to service.name
#
# [audit.alerts]
# enabled = true
# threshold_secs = 30
# cooldown_secs = 300
# notify_recovery = true
#
# [[audit.alerts.webhooks]]
# url = "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
# timeout_secs = 10
# # headers = { "Authorization" = "Bearer your-token" }

# ============================================================================
# KEY ROTATION CONFIGURATION (Optional)
# Requires feature: auth + a database backend (database, turso, or surrealdb)
# NIST SP 800-53 SC-12 compliant automated signing key lifecycle management
# ============================================================================
# [auth.key_rotation]
# enabled = true
# rotation_period_secs = 86400       # Rotate keys every 24 hours
# drain_grace_period_secs = 300      # 5 min grace after rotation for in-flight tokens
# check_interval_secs = 60           # Agent checks rotation status every 60 seconds
# retention_days = 90                # Keep retired key metadata for 90 days
# # bootstrap_key_path = "./keys/initial.key"  # Optional initial key for first startup

# ============================================================================
# LOGIN LOCKOUT CONFIGURATION (Optional)
# Requires feature: login-lockout (depends on auth + cache)
# ============================================================================
# [lockout]
# enabled = true
# max_attempts = 5                  # Lock after 5 failures
# window_secs = 900                 # 15-minute rolling window
# lockout_duration_secs = 1800      # Lock for 30 minutes
# progressive_delay_enabled = true  # Apply exponential backoff delays
# base_delay_ms = 1000              # 1 second initial delay
# max_delay_ms = 30000              # 30 second max delay
# delay_multiplier = 2.0            # Double delay each attempt
# warning_threshold = 3             # Notify after 3 failures (0 = disabled)
# key_prefix = "lockout"            # Redis key prefix

# ============================================================================
# ACCOUNT MANAGEMENT CONFIGURATION (Optional)
# Requires feature: accounts (depends on auth)
# ============================================================================
# [accounts]
# default_status = "pending_verification"  # Initial status for new accounts
# require_email_verification = true        # Require email verification before activation
# inactivity_expiry_days = 0               # Days of inactivity before expiry (0 = disabled)
# unique_usernames = false                 # Enforce unique usernames
# audit_events = true                      # Emit audit events for account lifecycle

# ============================================================================
# BACKGROUND WORKER CONFIGURATION (Optional)
# Managed background task execution with concurrency control
# ============================================================================
# [background_worker]
# enabled = true
# max_concurrent_tasks = 0          # 0 = unlimited
# task_shutdown_timeout_secs = 5
# cleanup_interval_secs = 0         # 0 = disabled

# ============================================================================
# OPENTELEMETRY CONFIGURATION (Optional)
# ============================================================================
[otlp]
endpoint = "http://otel-collector:4317"
service_name = "my-service"
enabled = true
