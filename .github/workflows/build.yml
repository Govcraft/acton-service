name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Changes that cannot affect compilation or test behaviour do not need the
  # Rust matrix. Note that skipping a job makes its check disappear entirely
  # rather than report success, and a required check that never reports blocks
  # a PR forever -- so the single required check is `ci-gate` below, which
  # always runs, and never these jobs directly.
  changes:
    name: detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
      docs: ${{ steps.detect.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect whether any code changed
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Author-controlled text. Kept in the environment and never
          # interpolated into the script, so a title like `"; rm -rf / #` is
          # inert data rather than a command.
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          ASSOCIATION: ${{ github.event.pull_request.author_association }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
          PUSH_FORCED: ${{ github.event.forced }}
        run: |
          set -euo pipefail

          # Emits both outputs together. Every exit path must set both, because an
          # unset output reads as an empty string and silently skips the job that
          # depends on it.
          emit() {
            echo "code=$1" >> "$GITHUB_OUTPUT"
            echo "docs=$2" >> "$GITHUB_OUTPUT"
            echo "Decision: code=$1 docs=$2"
            exit 0
          }

          # Work out which files changed, or bail out to running everything when there
          # is no reliable range to diff.
          case "$EVENT" in
            pull_request)
              files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
              ;;
            push)
              # Branch protection does not require pull requests to be up to date with
              # main before merging, so this push build is the safety net that catches
              # two independently-green pull requests conflicting once combined. It
              # still only needs to run for the parts that actually changed.
              if [ "$PUSH_FORCED" = "true" ] || [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ]; then
                echo "Push has no reliable base to diff against; running everything."
                emit true true
              fi
              files=$(git diff --name-only "$PUSH_BEFORE" "$PUSH_AFTER")
              ;;
            *)
              # Manual dispatch is an explicit request to test everything.
              echo "Event '$EVENT' is not a pull request or push; running everything."
              emit true true
              ;;
          esac

          echo "Changed files:"
          echo "$files" | sed 's/^/  /'

          # The documentation site is built whenever its sources change, so that broken
          # Markdoc fails the pull request instead of reaching the deploy job on main.
          if echo "$files" | grep -qE '^acton-docs/'; then
            docs=true
          else
            docs=false
          fi

          # The override markers live in the pull request title and body, so they only
          # apply to pull requests. They govern the Rust matrix; the documentation build
          # is cheap and always follows its own sources.
          if [ "$EVENT" = "pull_request" ]; then
            marker=$(printf '%s\n%s' "$PR_TITLE" "$PR_BODY")

            # `[full-ci]` is checked first so that forcing the matrix ON always beats
            # forcing it off. The safe override wins ties.
            if printf '%s' "$marker" | grep -qF '[full-ci]'; then
              echo "Found [full-ci]; running the full matrix regardless of paths."
              emit true "$docs"
            fi

            if printf '%s' "$marker" | grep -qF '[skip-matrix]'; then
              # Skipping is a CI bypass, so it is limited to people who already have
              # write access. For anyone else the marker is ignored rather than
              # honoured, and the normal path rules decide.
              case "$ASSOCIATION" in
                OWNER|MEMBER|COLLABORATOR)
                  echo "Found [skip-matrix] from $ASSOCIATION; skipping the Rust matrix."
                  emit false "$docs"
                  ;;
                *)
                  echo "::warning::Ignoring [skip-matrix] from $ASSOCIATION -- write access is required to skip CI."
                  ;;
              esac
            fi
          fi

          # Anything not matched here counts as code and runs the matrix, so a new
          # top-level directory fails safe by being tested. build.yml is deliberately
          # absent from this list: a change to the build matrix should be exercised by
          # the build matrix. Markdown is skipped only at the repository root, leaving a
          # future doc-include under src/ to be caught by the compiler.
          remaining=$(echo "$files" | grep -vE \
            -e '^acton-docs/' \
            -e '^[^/]*\.md$' \
            -e '^\.remember/' \
            -e '^LICENSE' \
            -e '^\.gitignore$' \
            -e '^\.github/(ISSUE_TEMPLATE/|PULL_REQUEST_TEMPLATE|dependabot\.yml|workflows/(claude|claude-code-review|deploy-docs|docs-sync-on-merge)\.yml)' \
            || true)

          if [ -z "$remaining" ]; then
            echo "No code changed; skipping the Rust matrix."
            emit false "$docs"
          else
            echo "Code changed; running the Rust matrix."
            emit true "$docs"
          fi

  aws-lc-rs:
    name: crypto-aws-lc-rs (default)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Installed from the Ubuntu archive rather than downloaded from GitHub
      # releases: keeps a GitHub outage from failing the build before anything
      # is compiled. Ubuntu 24.04 ships protoc 3.21.12, which is sufficient --
      # every .proto here is plain proto3 with no editions or proto3 optional.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Clippy
        run: cargo clippy -p acton-service --all-targets --features full -- -D warnings
      - name: Nextest
        run: cargo nextest run -p acton-service --features full
      # nextest does not run doctests, so without this step the examples in the
      # rustdoc -- including the crate-level block that becomes the docs.rs
      # front page -- are never compiled by CI. Run once here on the default
      # crypto provider rather than on every leg: the examples do not vary by
      # backend, and they add roughly twenty seconds.
      - name: Doctests
        run: cargo test --doc -p acton-service --features full

  ring:
    name: crypto-ring (opt-in)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Installed from the Ubuntu archive rather than downloaded from GitHub
      # releases: keeps a GitHub outage from failing the build before anything
      # is compiled. Ubuntu 24.04 ships protoc 3.21.12, which is sufficient --
      # every .proto here is plain proto3 with no editions or proto3 optional.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Clippy
        run: cargo clippy -p acton-service --all-targets --no-default-features --features "full,crypto-ring" -- -D warnings
      - name: Nextest
        run: cargo nextest run -p acton-service --no-default-features --features "full,crypto-ring"

  # The `full` legs above cover audit with the PostgreSQL storage backend
  # (`database` is in `full`). The optional backends are mutually exclusive
  # with `database`, so each parser/unit path gets its own leg. All storage
  # tests here are pure unit tests — no live services required.
  audit-storage:
    name: audit storage (${{ matrix.backend }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: turso
            features: --no-default-features --features "audit,turso,http,observability,crypto-aws-lc-rs"
          - backend: surrealdb
            features: --no-default-features --features "audit,surrealdb,http,observability,crypto-aws-lc-rs"
          - backend: clickhouse
            features: --features "audit,clickhouse"
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit-${{ matrix.backend }}
      - uses: taiki-e/install-action@nextest
      - name: Nextest
        run: cargo nextest run -p acton-service ${{ matrix.features }}

  # Builds the documentation site so that broken Markdoc fails the pull request
  # rather than reaching the deploy job after the merge has already landed on
  # main. This matters most for the automated documentation pull requests: they
  # skip the Rust matrix and auto-merge, so without this nothing would compile
  # their output before it went live.
  docs-build:
    name: docs build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./acton-docs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: acton-docs/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build with Next.js
        run: pnpm run build
        env:
          GITHUB_ACTIONS: true

  # The single required status check. This always runs, so it always reports a
  # conclusion -- including on documentation-only pull requests where every
  # matrix job is skipped. Requiring the matrix jobs directly would deadlock
  # those PRs, because a skipped job reports nothing at all.
  ci-gate:
    name: ci-gate
    needs: [changes, aws-lc-rs, ring, audit-storage, docs-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$RESULTS"
          # 'skipped' is a pass: it means this PR touched no code. Only real
          # failures and cancellations block the merge.
          if echo "$RESULTS" | grep -qE '"result": "(failure|cancelled)"'; then
            echo "::error::A required build job failed or was cancelled."
            exit 1
          fi
          echo "All required build jobs passed or were legitimately skipped."
