name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  aws-lc-rs:
    name: crypto-aws-lc-rs (default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Installed from the Ubuntu archive rather than downloaded from GitHub
      # releases: keeps a GitHub outage from failing the build before anything
      # is compiled. Ubuntu 24.04 ships protoc 3.21.12, which is sufficient --
      # every .proto here is plain proto3 with no editions or proto3 optional.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Clippy
        run: cargo clippy -p acton-service --all-targets --features full -- -D warnings
      - name: Nextest
        run: cargo nextest run -p acton-service --features full

  ring:
    name: crypto-ring (opt-in)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Installed from the Ubuntu archive rather than downloaded from GitHub
      # releases: keeps a GitHub outage from failing the build before anything
      # is compiled. Ubuntu 24.04 ships protoc 3.21.12, which is sufficient --
      # every .proto here is plain proto3 with no editions or proto3 optional.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Clippy
        run: cargo clippy -p acton-service --all-targets --no-default-features --features "full,crypto-ring" -- -D warnings
      - name: Nextest
        run: cargo nextest run -p acton-service --no-default-features --features "full,crypto-ring"
